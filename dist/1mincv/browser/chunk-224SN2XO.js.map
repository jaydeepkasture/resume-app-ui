<div class="resume-container">
  <!-- Header -->
  <div class="header">
    <input class="name" [(ngModel)]="resumeData.name" (ngModelChange)="onModelChange()" placeholder="Your Name">
    <input class="role" style="display: block; width: 100%; text-align: center; margin-top: 5px; font-size: 1.2em;" [(ngModel)]="resumeData.role" (ngModelChange)="onModelChange()" placeholder="Professional Role">
    <div style="display: flex; justify-content: center; gap: 10px; margin-top: 5px;">
      <input class="contact" style="width: auto;" [(ngModel)]="resumeData.email" (ngModelChange)="onModelChange()" placeholder="Email">
      <span>|</span>
      <input class="contact" style="width: auto;" [(ngModel)]="resumeData.phoneNo" (ngModelChange)="onModelChange()" placeholder="Phone">
      <span>|</span>
      <input class="contact" style="width: auto;" [(ngModel)]="resumeData.location" (ngModelChange)="onModelChange()" placeholder="Location">
    </div>
    <div style="display: flex; justify-content: center; gap: 10px; margin-top: 5px;">
      <input class="contact" style="width: auto;" [(ngModel)]="resumeData.linkedIn" (ngModelChange)="onModelChange()" placeholder="LinkedIn">
      <span>|</span>
      <input class="contact" style="width: auto;" [(ngModel)]="resumeData.gitHub" (ngModelChange)="onModelChange()" placeholder="GitHub">
    </div>
  </div>

  <!-- Summary -->
  <div class="section">
    <div class="section-title">Professional Summary</div>
    <textarea [(ngModel)]="resumeData.summary" (ngModelChange)="onModelChange()" placeholder="Write a professional summary..."></textarea>
  </div>

  <!-- Experience -->
  <div class="section">
    <div class="section-title">Experience</div>
    
    <div class="job-item" *ngFor="let job of resumeData.experience; let i = index">
      <div class="job-header">
        <input style="font-weight: bold; width: 48%;" [(ngModel)]="job.position" (ngModelChange)="onModelChange()" placeholder="Role">
        <div style="text-align: right; width: 48%;">
            <input style="width: 45%; text-align: center" [(ngModel)]="job.from" (ngModelChange)="onModelChange()" placeholder="From">
            <span> - </span>
            <input style="width: 45%; text-align: center" [(ngModel)]="job.to" (ngModelChange)="onModelChange()" placeholder="To">
        </div>
      </div>
      <input style="font-style: italic; margin-bottom: 5px;" [(ngModel)]="job.company" (ngModelChange)="onModelChange()" placeholder="Company Name">
      <div class="bullets-section">
          <div class="bullet-item" *ngFor="let point of job.description; let bpIndex = index; trackBy: trackByIndex">
              <span class="bullet-point">•</span>
              <textarea class="bullet-input" [(ngModel)]="job.description[bpIndex]" (ngModelChange)="onModelChange()" rows="1" placeholder="Achievement..."></textarea>
              <button class="remove-bullet-btn" (click)="removeExpBullet(i, bpIndex)" title="Remove bullet">×</button>
          </div>
          <button class="add-bullet-btn" (click)="addExpBullet(i)">+ Add Bullet</button>
      </div>
      
      <button class="remove-btn" (click)="removeExperience(i)">Remove Position</button>
    </div>

    <button class="add-btn" (click)="addExperience()">+ Add Experience</button>
  </div>

  <!-- Skills -->
  <div class="section">
    <div class="section-title">Skills</div>
    <textarea [(ngModel)]="resumeData.skills" (ngModelChange)="onModelChange()" placeholder="List your skills (comma separated or lines)..."></textarea>
  </div>

  <!-- Education -->
   <div class="section">
    <div class="section-title">Education</div>
    <!-- Simple flexible education list -->
    <div *ngIf="resumeData.education">
         <div *ngFor="let edu of resumeData.education; let i = index" class="edu-item" style="margin-bottom: 15px;">
             <div class="job-header">
                <input style="font-weight: bold; width: 48%;" [(ngModel)]="edu.degree" (ngModelChange)="onModelChange()" placeholder="Degree">
                <input style="text-align: right; width: 48%;" [(ngModel)]="edu.year" (ngModelChange)="onModelChange()" placeholder="Year">
             </div>
             <input style="font-style: italic; margin-bottom: 5px;" [(ngModel)]="edu.institution" (ngModelChange)="onModelChange()" placeholder="University">
             
             <textarea class="item-desc" [(ngModel)]="edu.description" (ngModelChange)="onModelChange()" placeholder="Details/Achievements..."></textarea>
             <button class="remove-btn" (click)="removeEducation(i)">Remove Education</button>
         </div>
    </div>
    <button class="add-btn" (click)="addEducation()">+ Add Education</button>
  </div>

</div>
